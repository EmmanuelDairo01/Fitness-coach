version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitai
      POSTGRES_PASSWORD: fitai
      POSTGRES_DB: fitai
    ports:
      - "5432:5432"
    volumes:
      - fitai_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitai"]
      interval: 5s
      timeout: 5s
      retries: 10

  ai-service:
    build: ./ai-service
    restart: unless-stopped
    env_file: ./ai-service/.env
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgres://fitai:fitai@db:5432/fitai
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  fitai_pgdata:
